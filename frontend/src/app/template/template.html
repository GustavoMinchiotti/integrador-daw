<header class="app-header">
    <a class="brand" routerLink="/proyectos" aria-label="Ir a proyectos">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">PULSO</span>
        <span class="brand-edition">Grupo AM / 2026</span>
    </a>

    <div class="header-actions">
        <span class="system-status"><i aria-hidden="true"></i>Sesión activa</span>
        <p-button
            id="boton-tema"
            [icon]="themeStore.icon()"
            [text]="true"
            [pTooltip]="themeStore.label()"
            [attr.aria-label]="themeStore.label()"
            (click)="themeStore.toggle()">
        </p-button>
        <p-button
            id="boton-cerrar-sesion"
            icon="pi pi-sign-out"
            [text]="true"
            pTooltip="Cerrar sesión"
            aria-label="Cerrar sesión"
            (click)="cerrarSesion()">
        </p-button>
    </div>
</header>

<main class="app-content">
    <ng-content></ng-content>
</main>
