<main class="login-shell">
    <section class="login-panel">
        <div class="brand-lockup">
            <span class="brand-symbol" aria-hidden="true"></span>
            <span>Grupo AM presenta</span>
        </div>

        <div class="login-heading">
            <p class="edition">Control de proyectos / Edición 2026</p>
            <h1>PULSO</h1>
            <p class="tagline">Ideas en movimiento.<br>Trabajo en foco.</p>
        </div>

        <form [formGroup]="form" class="login-form" (ngSubmit)="iniciarSesion()">
            <label for="nombre">Usuario</label>
            <input
                pInputText
                id="nombre"
                type="text"
                autocomplete="username"
                placeholder="Ingresá tu usuario"
                formControlName="nombre" />

            <label for="clave">Clave</label>
            <p-password
                id="clave"
                formControlName="clave"
                [feedback]="false"
                [toggleMask]="true"
                autocomplete="current-password"
                placeholder="Ingresá tu clave">
            </p-password>

            <p-button
                type="submit"
                label="Entrar al espacio"
                icon="pi pi-arrow-right"
                iconPos="right">
            </p-button>
        </form>

        <footer>Desarrollo de Aplicaciones Web · TPI</footer>
    </section>

    <aside class="login-art" aria-hidden="true">
        <div class="art-index">01 / SISTEMA</div>
        <div class="art-caption">Planificar · ejecutar · medir</div>
    </aside>
</main>
