<p-dialog header="Clientes" [modal]="true" closeAriaLabel="Cerrar diálogo" [(visible)]="visible"
    [style]="{ width: '50rem', maxWidth: 'calc(100vw - 2rem)' }">
    <p-button id="boton-crear-cliente" icon="pi pi-plus" label="Nuevo cliente" (click)="crearCliente()"></p-button>
    <p-table id="tabla" aria-label="Listado de clientes" [value]="clientes()" [scrollable]="true"
        scrollHeight="70vh">
        <ng-template #header>
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Estado</th>
                <th scope="col" class="actions-heading">Acciones</th>
            </tr>
        </ng-template>
        <ng-template #body let-cliente>
            <tr>
                <td>{{ cliente.nombre }}</td>
                <td>{{ cliente.estado }}</td>
                <td class="row-actions">
                    <p-button icon="pi pi-pencil" severity="secondary" [text]="true"
                        pTooltip="Editar cliente" [attr.aria-label]="'Editar cliente ' + cliente.nombre"
                        (click)="editarCliente(cliente)"></p-button>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="3" class="empty-state">No se encontraron clientes.</td>
            </tr>
        </ng-template>
    </p-table>
</p-dialog>
<app-gestion-cliente [(visible)]="dialogVisible" [(clienteSeleccionado)]="clienteSeleccionado"></app-gestion-cliente>
