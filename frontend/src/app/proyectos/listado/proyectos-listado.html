<app-template>

    <!-- PANEL SUPERIOR -->
    <div class="filtro-panel flex align-items-center gap-3">

        <input
            type="text"
            placeholder="🔍 Buscar proyecto por nombre..."
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event); buscarOFiltrar()"
            class="filtro-input"
        />

        <select
            [ngModel]="estadoFiltro()"
            (ngModelChange)="estadoFiltro.set($event); buscarOFiltrar()"
            class="estado-filtro"
            title="Filtrar proyectos por estado"
            aria-label="Filtrar proyectos por estado"
        >
            <option value="">📂 Todos los Estados</option>
            <option value="ACTIVO">🟢 Activos</option>
            <option value="FINALIZADO">✅ Finalizados</option>
            <option value="BAJA">⚫ Dados de Baja</option>
        </select>

    </div>

    <!-- BOTÓN CREAR -->
    <div class="crear-contenedor">
        <p-button
            id="boton-crear-proyecto"
            icon="pi pi-plus"
            label="Crear Proyecto"
            (click)="crearProyecto()">
        </p-button>
    </div>

    <!--  TABLA -->
    <p-table
        id="tabla"
        [value]="proyectos()"
        [tableStyle]="{ 'min-width': '50rem' }"
        [scrollable]="true"
        scrollHeight="60vh"
    >

        <!-- 🔹 HEADER -->
        <ng-template #header>
            <tr>
                <th>📌 Nombre</th>
                <th>🏢 Cliente</th>
                <th>📊 Estado</th>
                <th>⚙️ Acciones</th>
            </tr>
        </ng-template>

        <!-- 🔹 BODY -->
        <ng-template #body let-proyecto>
            <tr>

                <!-- Nombre -->
                <td>
                    <strong>{{ proyecto.nombre }}</strong>
                </td>

                <!-- Cliente -->
                <td>
                    @if (proyecto.cliente) {
                        <span class="cliente-nombre">
                            💼 {{ proyecto.cliente.nombre }}
                        </span>
                    } @else {
                        <span class="cliente-interno">
                            ⚙️ Desarrollo Interno
                        </span>
                    }
                </td>

                <!-- Estado -->
                <td>
                    <span
                        [ngStyle]="{
                            padding: '4px 8px',
                            'border-radius': '6px',
                            'font-size': '0.8rem',
                            'background-color':
                                proyecto.estado === 'ACTIVO' ? '#10b981' :
                                proyecto.estado === 'FINALIZADO' ? '#3b82f6' :
                                '#6b7280',
                            color: 'white'
                        }"
                    >
                        {{ proyecto.estado }}
                    </span>
                </td>

                <!-- Acciones -->
                <td>

                    <p-button
                        id="boton-gestionar-tareas"
                        icon="pi pi-list"
                        severity="info"
                        pTooltip="Ver tareas (Kanban)"
                        (click)="gestionarTareas(proyecto)">
                    </p-button>

                    <p-button
                        icon="pi pi-pencil"
                        severity="success"
                        pTooltip="Editar proyecto"
                        (click)="editarProyecto(proyecto)">
                    </p-button>

                </td>

            </tr>
        </ng-template>

        <!--  -->
                <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="emptymessage-td">
                    📭 No se encontraron proyectos con estos filtros
                </td>
            </tr>
        </ng-template>

    </p-table>

    <!--  PAGINACIÓN  -->
    <div class="paginacion-container paginacion-estilos">

        <button
            [disabled]="currentPage() === 1"
            (click)="cambiarPagina(currentPage() - 1)">
            « Anterior
        </button>

        <span class="paginacion-texto">
            Página {{ currentPage() }} de {{ totalPages() }}
        </span>

        <button
            [disabled]="currentPage() === totalPages()"
            (click)="cambiarPagina(currentPage() + 1)">
            Siguiente »
        </button>

    </div>

</app-template>

<!--  MODAL -->
<app-gestion-proyecto
    [(visible)]="dialogVisible"
    [(proyectoSeleccionado)]="proyectoSeleccionado">
</app-gestion-proyecto>
