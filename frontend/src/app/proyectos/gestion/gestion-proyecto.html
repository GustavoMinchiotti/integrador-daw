<p-dialog [header]="header()" [modal]="true" [(visible)]="visible"
    [style]="{ width: '28rem', maxWidth: 'calc(100vw - 2rem)' }" (onHide)="cerrarDialog()">
    <form [formGroup]="form" class="entity-form">
        <label for="nombre">Nombre del proyecto</label>
        <input pInputText type="text" id="nombre" placeholder="Ej. Portal de clientes" formControlName="nombre" />

        <label for="cliente">Cliente</label>
        <ng-select id="cliente" formControlName="cliente" [items]="clientes()" bindLabel="nombre"
            placeholder="Proyecto interno" [clearable]="true" />

        <button id="boton-gestionar-clientes" pButton type="button" icon="pi pi-users"
            label="Gestionar clientes" severity="secondary" (click)="gestionarClientes()"></button>

        @if (proyectoSeleccionado()) {
            <label for="estado">Estado</label>
            <p-select id="estado" formControlName="estado" [options]="estados()" placeholder="Estado" appendTo="body" />
        }

        <button pButton type="button" id="guardar" icon="pi pi-check" label="Guardar proyecto"
            (click)="guardarProyecto()"></button>
    </form>
</p-dialog>

<app-clientes-listado [(visible)]="dialogClientesVisible"></app-clientes-listado>
