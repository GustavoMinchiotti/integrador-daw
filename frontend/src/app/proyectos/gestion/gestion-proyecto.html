<p-dialog [header]="header()" [modal]="true" [(visible)]="visible"
    [style]="{ width: '28rem', maxWidth: 'calc(100vw - 2rem)' }" (onHide)="cerrarDialog()">
    <form [formGroup]="form" class="entity-form" (ngSubmit)="guardarProyecto()">
        <label for="nombre">Nombre del proyecto</label>
        <input pInputText type="text" id="nombre" placeholder="Ej. Portal de clientes" formControlName="nombre"
            [attr.aria-invalid]="form.controls['nombre'].touched && form.controls['nombre'].invalid"
            aria-describedby="proyecto-nombre-error" />
        @if (form.controls['nombre'].touched && form.controls['nombre'].invalid) {
            <small id="proyecto-nombre-error" class="form-error">Ingresá el nombre del proyecto.</small>
        }

        <label for="cliente">Cliente</label>
        <ng-select id="cliente" formControlName="cliente" [items]="clientes()" bindLabel="nombre"
            placeholder="Proyecto interno" [clearable]="true" />

        <button id="boton-gestionar-clientes" pButton type="button" icon="pi pi-users"
            label="Gestionar clientes" severity="secondary" (click)="gestionarClientes()"></button>

        @if (proyectoSeleccionado()) {
            <label for="estado">Estado</label>
            <p-select inputId="estado" formControlName="estado" [options]="estados()" placeholder="Estado" appendTo="body" />
        }

        <button pButton type="submit" id="guardar" icon="pi pi-check" label="Guardar proyecto"
            [loading]="guardando()" [disabled]="guardando()"></button>
    </form>
</p-dialog>

<app-clientes-listado [(visible)]="dialogClientesVisible"></app-clientes-listado>
